name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate HTML structure
        run: python scripts/validate_html.py index.html

      - name: Check internal anchors resolve
        run: |
          python3 - <<'PY'
          import re, sys
          html = open('index.html', encoding='utf-8').read()
          anchors = set(re.findall(r'href="#([\w-]+)"', html))
          ids = set(re.findall(r'id="([\w-]+)"', html))
          missing = {a for a in anchors if a and a not in ids}
          if missing:
              print("ERROR: broken anchors ->", missing)
              sys.exit(1)
          print("OK: all internal anchors resolve to an id")
          PY
